name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore ZenWin.sln
      - run: dotnet build ZenWin.sln -c Release --no-restore
      - run: dotnet test ZenWin.sln -c Release --no-build
      - run: dotnet publish src/ZenWin.UI/ZenWin.UI.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o artifacts/${{ matrix.rid }}
      - uses: actions/upload-artifact@v4
        with:
          name: ZenWin-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}
